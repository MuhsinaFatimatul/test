apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: node:18-alpine
          ports:
            - containerPort: 3000
          command: ["node", "-e", "require('http').createServer((req,res)=>res.end('backend ok')).listen(3000)"]
